<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christopher Rhodes</title>
  <meta name="description" content="Christopher Rhodes: data visualisation, photography and making." />
  <style>
    :root {
      --bg: #050607;
      --panel: rgba(255, 255, 255, 0.06);
      --text: #f4f7f8;
      --muted: #a8b3b8;
      --accent: #17c7c9;
      --accent-soft: rgba(23, 199, 201, 0.18);
      --line: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(23, 199, 201, 0.18), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 28rem),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    main {
      width: min(100%, 30rem);
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: 2rem;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      box-shadow: 0 1.5rem 5rem rgba(0,0,0,0.38);
      backdrop-filter: blur(18px);
    }

    .monogram {
      width: 5.5rem;
      height: 5.5rem;
      margin: 0 auto 1.4rem;
      display: grid;
      place-items: center;
      border: 2px solid var(--accent);
      border-radius: 50%;
      color: var(--text);
      font-weight: 800;
      letter-spacing: -0.12em;
      font-size: 2rem;
      position: relative;
    }

    .monogram::after {
      content: "";
      position: absolute;
      inset: 0.45rem;
      border: 1px solid var(--line);
      border-radius: 50%;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: -0.06em;
      line-height: 0.95;
    }

    .role {
      margin: 0.8rem auto 1.2rem;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .statement {
      margin: 0 0 1.6rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 1.2rem;
      background: rgba(0, 0, 0, 0.22);
      color: #dce5e7;
      line-height: 1.6;
      text-align: center;
    }

    .links {
      display: grid;
      gap: 0.75rem;
    }

    a.link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.1rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      color: var(--text);
      text-decoration: none;
      background: var(--panel);
    }

    a.link:hover,
    a.link:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: var(--accent-soft);
      outline: none;
    }

    .link span:first-child {
      font-weight: 700;
    }

    .arrow {
      color: var(--accent);
      font-size: 1.25rem;
    }

    code {
      display: block;
      margin-top: 1.6rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--line);
      color: var(--accent);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.86rem;
      text-align: center;
      white-space: normal;
    }

    footer {
      margin-top: 1.1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="monogram" aria-label="CR monogram">CR</div>

    <h1>Christopher Rhodes</h1>
    <p class="role">Data Visualisation Manager<br />Builder • Photographer • Maker</p>

    <p class="statement">Turning complex data into clear decisions, and making useful things along the way.</p>

    <section class="links" aria-label="Links">
      <a class="link" href="https://www.linkedin.com/in/chrisjrhodes" rel="me noopener noreferrer">
        <span>LinkedIn</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a class="link" href="https://www.instagram.com/smallthingssorted" rel="me noopener noreferrer">
        <span>Cricut & Making</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>

      <a class="link" href="https://www.instagram.com/ukchristography" rel="me noopener noreferrer">
        <span>Photography</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
    </section>

    <code>SELECT * FROM curiosity WHERE connected = TRUE;</code>

    <footer>Wigan, UK</footer>
  </main>
</body>
</html>
